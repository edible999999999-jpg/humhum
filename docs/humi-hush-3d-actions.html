<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HUMHUM 3D Pet Action Preview</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #172022;
        --muted: #687578;
        --line: rgba(23, 32, 34, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 15%, rgba(207, 232, 222, 0.85), transparent 30%),
          radial-gradient(circle at 80% 20%, rgba(216, 233, 255, 0.78), transparent 28%),
          linear-gradient(135deg, #f7faf8 0%, #eef3f0 60%, #e7eeeb 100%);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        grid-template-columns: minmax(260px, 380px) minmax(420px, 1fr);
        gap: clamp(24px, 4vw, 52px);
        align-items: center;
        width: min(1240px, calc(100vw - 56px));
        min-height: 100vh;
        margin: 0 auto;
      }

      .copy {
        display: grid;
        gap: 16px;
      }

      .eyebrow {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(42px, 6vw, 76px);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .copy p:last-child {
        max-width: 32em;
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.8;
      }

      .stage {
        position: relative;
        min-height: 620px;
        isolation: isolate;
      }

      .window {
        position: absolute;
        inset: 50%;
        width: min(76vw, 680px);
        height: 430px;
        transform: translate(-50%, -50%);
        overflow: hidden;
        border: 1px solid rgba(23, 32, 34, 0.18);
        border-radius: 18px;
        background: rgba(248, 251, 249, 0.82);
        box-shadow:
          0 34px 90px rgba(45, 63, 68, 0.16),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(18px);
      }

      .window-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        height: 52px;
        padding: 0 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.58);
      }

      .window-bar span {
        width: 12px;
        height: 12px;
        border-radius: 50%;
      }

      .window-bar span:nth-child(1) {
        background: #ff7970;
      }

      .window-bar span:nth-child(2) {
        background: #ffc15a;
      }

      .window-bar span:nth-child(3) {
        background: #6bdc90;
      }

      .window-bar b {
        margin-left: 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .window-body {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 14px;
        padding: 26px;
      }

      .window-body div {
        min-height: 250px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.58);
      }

      .window-body small {
        display: block;
        margin-bottom: 12px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .window-body strong {
        display: block;
        font-size: 18px;
        line-height: 1.42;
      }

      .hush-card {
        position: absolute;
        left: 6%;
        bottom: 21%;
        z-index: 3;
        width: 190px;
        padding: 16px 18px;
        border: 1px solid rgba(23, 32, 34, 0.12);
        border-radius: 16px;
        background: rgba(248, 251, 249, 0.9);
        box-shadow: 0 18px 42px rgba(45, 63, 68, 0.14);
        pointer-events: none;
      }

      .hush-card small {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .hush-card strong {
        display: block;
        font-size: 15px;
        line-height: 1.35;
      }

      canvas {
        position: absolute;
        inset: 0;
        z-index: 2;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }

      .status {
        position: absolute;
        left: clamp(0px, 5vw, 84px);
        bottom: 34px;
        z-index: 4;
        color: var(--muted);
        font-size: 13px;
        font-weight: 900;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="copy">
        <p class="eyebrow">HUMHUM 3D pet action preview</p>
        <h1>Humi / Hush 动作原型</h1>
        <p>Humi 使用慢速正面漂浮巡游；Hush 禁用内置收缩动画，静止躲在聊天框后，只露头。</p>
      </section>

      <section class="stage" data-stage>
        <div class="window">
          <div class="window-bar">
            <span></span>
            <span></span>
            <span></span>
            <b>memory.md</b>
          </div>
          <div class="window-body">
            <div>
              <small>Today</small>
              <strong>整理用户记忆、偏好和日常任务</strong>
            </div>
            <div>
              <small>Status</small>
              <strong>Humi 慢慢巡游，Hush 藏在提示框后</strong>
            </div>
            <div>
              <small>Next</small>
              <strong>靠近消息红点并提醒用户</strong>
            </div>
          </div>
        </div>
        <div class="hush-card" aria-hidden="true">
          <small>hidden note</small>
          <strong>Hush 躲在这里</strong>
        </div>
        <canvas data-canvas></canvas>
        <div class="status" data-status>loading</div>
      </section>
    </main>

    <script type="module">
      import * as THREE from 'https://esm.sh/three@0.165.0';
      import { GLTFLoader } from 'https://esm.sh/three@0.165.0/examples/jsm/loaders/GLTFLoader.js';

      const stage = document.querySelector('[data-stage]');
      const canvas = document.querySelector('[data-canvas]');
      const status = document.querySelector('[data-status]');
      const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true, canvas });

      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(34, 1, 0.1, 100);
      camera.position.set(0, 0, 8.6);

      scene.add(new THREE.HemisphereLight(0xffffff, 0xb8c7d8, 2.5));
      const key = new THREE.DirectionalLight(0xffffff, 4.2);
      key.position.set(2.8, 4, 5);
      key.castShadow = true;
      scene.add(key);

      const fill = new THREE.DirectionalLight(0xbbe5ff, 1.2);
      fill.position.set(-4, -2, 3);
      scene.add(fill);

      const shadowPlane = new THREE.Mesh(
        new THREE.PlaneGeometry(8, 5),
        new THREE.ShadowMaterial({ color: 0x2f3437, opacity: 0.14 }),
      );
      shadowPlane.position.z = -0.8;
      shadowPlane.receiveShadow = true;
      scene.add(shadowPlane);

      const routeBounds = {
        halfWidth: 5.1 / 2 + 0.18,
        halfHeight: 3.25 / 2 + 0.18,
        cornerRadius: 0.42,
      };

      const pets = [
        {
          name: 'Humi',
          file: '../public/mascots/3d/humi-window-pet.glb',
          speed: 0.045,
          phase: 0,
          targetScale: 0.92,
          mode: 'float',
          group: new THREE.Group(),
          mixer: null,
        },
        {
          name: 'Hush',
          file: '../public/mascots/3d/hush-peek-pet.glb',
          speed: 0,
          phase: 0,
          targetScale: 0.82,
          mode: 'sneak',
          group: new THREE.Group(),
          mixer: null,
        },
      ];

      for (const pet of pets) scene.add(pet.group);

      function setModelMaterials(model) {
        model.traverse((child) => {
          if (!child.isMesh) return;
          child.castShadow = true;
          child.receiveShadow = true;
          if (child.material) {
            child.material.roughness = Math.min(child.material.roughness ?? 0.62, 0.72);
            child.material.metalness = child.material.metalness ?? 0;
          }
        });
      }

      function fitModel(model, targetScale) {
        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);
        model.position.sub(center);
        model.scale.setScalar((1 / Math.max(size.x, size.y, size.z)) * targetScale);
      }

      const loader = new GLTFLoader();
      let loaded = 0;
      for (const pet of pets) {
        loader.load(
          pet.file,
          (gltf) => {
            const model = gltf.scene;
            setModelMaterials(model);
            fitModel(model, pet.targetScale);
            pet.group.add(model);

            if (pet.mode !== 'sneak' && gltf.animations.length > 0) {
              pet.mixer = new THREE.AnimationMixer(model);
              for (const clip of gltf.animations) pet.mixer.clipAction(clip).play();
            }

            loaded += 1;
            status.textContent = loaded === pets.length ? 'Humi / Hush ready' : 'loading';
          },
          undefined,
          (error) => {
            status.textContent = `${pet.name} load failed: ${error.message}`;
          },
        );
      }

      function getRoundedRectPosition(progress) {
        const { halfWidth, halfHeight, cornerRadius } = routeBounds;
        const straightWidth = halfWidth * 2 - cornerRadius * 2;
        const straightHeight = halfHeight * 2 - cornerRadius * 2;
        const arcLength = Math.PI * cornerRadius / 2;
        const perimeter = straightWidth * 2 + straightHeight * 2 + arcLength * 4;
        let distance = progress * perimeter;

        const consume = (length) => {
          if (distance > length) {
            distance -= length;
            return false;
          }
          return true;
        };

        if (consume(straightWidth)) return new THREE.Vector3(-halfWidth + cornerRadius + distance, halfHeight, 0);
        if (consume(arcLength)) {
          const theta = Math.PI / 2 - distance / cornerRadius;
          return new THREE.Vector3(
            halfWidth - cornerRadius + Math.cos(theta) * cornerRadius,
            halfHeight - cornerRadius + Math.sin(theta) * cornerRadius,
            0,
          );
        }
        if (consume(straightHeight)) return new THREE.Vector3(halfWidth, halfHeight - cornerRadius - distance, 0);
        if (consume(arcLength)) {
          const theta = -distance / cornerRadius;
          return new THREE.Vector3(
            halfWidth - cornerRadius + Math.cos(theta) * cornerRadius,
            -halfHeight + cornerRadius + Math.sin(theta) * cornerRadius,
            0,
          );
        }
        if (consume(straightWidth)) return new THREE.Vector3(halfWidth - cornerRadius - distance, -halfHeight, 0);
        if (consume(arcLength)) {
          const theta = -Math.PI / 2 - distance / cornerRadius;
          return new THREE.Vector3(
            -halfWidth + cornerRadius + Math.cos(theta) * cornerRadius,
            -halfHeight + cornerRadius + Math.sin(theta) * cornerRadius,
            0,
          );
        }
        if (consume(straightHeight)) return new THREE.Vector3(-halfWidth, -halfHeight + cornerRadius + distance, 0);

        const theta = Math.PI - distance / cornerRadius;
        return new THREE.Vector3(
          -halfWidth + cornerRadius + Math.cos(theta) * cornerRadius,
          halfHeight - cornerRadius + Math.sin(theta) * cornerRadius,
          0,
        );
      }

      function resize() {
        const rect = stage.getBoundingClientRect();
        renderer.setSize(rect.width, rect.height, false);
        camera.aspect = rect.width / rect.height;
        camera.updateProjectionMatrix();
      }

      const clock = new THREE.Clock();
      let time = 0;

      function animate() {
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(), 0.05);
        time += dt;

        for (const pet of pets) {
          if (pet.mode === 'float') {
            const pos = getRoundedRectPosition((time * pet.speed + pet.phase) % 1);
            const pulse = Math.sin(time * 2.6);
            pet.group.position.set(pos.x, pos.y + Math.sin(time * 2.2) * 0.1, 1.06);
            pet.group.rotation.set(0.08 + Math.sin(time * 2.4) * 0.025, Math.sin(time * 1.8) * 0.05, Math.sin(time * 1.5) * 0.04);
            pet.group.scale.set(1 + pulse * 0.018, 1 + Math.sin(time * 2.6 + 0.8) * 0.035, 1 + pulse * 0.018);
          } else {
            pet.group.position.set(-2.3, -0.86, 0.78);
            pet.group.rotation.set(0.01, 0, 0);
            pet.group.scale.set(0.8, 0.8, 0.8);
          }

          if (pet.mixer) pet.mixer.update(dt);
        }

        renderer.render(scene, camera);
      }

      window.addEventListener('resize', resize);
      resize();
      animate();
    </script>
  </body>
</html>
