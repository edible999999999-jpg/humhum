<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Hum v4 — Cute Jellyfish</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #08081a; color: #e0e0e0; font-family: -apple-system, 'PingFang SC', sans-serif; }
  h1 { text-align: center; padding: 36px 0 4px; font-size: 28px; color: #c4b5fd; letter-spacing: 3px; }
  .subtitle { text-align: center; color: #6b7280; font-size: 13px; margin-bottom: 32px; }
  .section { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
  .section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: #4b5563; margin: 48px 0 20px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .controls { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
  .controls button { padding: 6px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); color: #9ca3af; cursor: pointer; font-size: 12px; transition: all 0.2s; }
  .controls button:hover, .controls button.active { background: rgba(139,92,246,0.12); border-color: rgba(139,92,246,0.3); color: #c4b5fd; }
  .ctrl-label { text-align: center; font-size: 10px; color: #374151; text-transform: uppercase; letter-spacing: 1.5px; margin: 16px 0 6px; }
  .stage { display: flex; justify-content: center; align-items: center; min-height: 400px; position: relative; margin-bottom: 20px; }
  .stage-glow { position: absolute; width: 280px; height: 280px; border-radius: 50%; filter: blur(80px); opacity: 0.07; transition: background 0.8s; }
  .scene-desc { text-align: center; max-width: 520px; margin: 0 auto 40px; padding: 16px 24px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; }
  .scene-desc h3 { font-size: 14px; color: #c4b5fd; margin-bottom: 6px; }
  .scene-desc p { font-size: 12px; color: #6b7280; line-height: 1.7; }
  .scene-desc .tn { font-size: 11px; color: #8b5cf6; margin-top: 8px; font-style: italic; }
  .scenes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 60px; }
  .scene-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; display: flex; gap: 14px; align-items: center; cursor: pointer; transition: all 0.3s; }
  .scene-card:hover { border-color: rgba(139,92,246,0.2); }
  .scene-card.active { border-color: rgba(139,92,246,0.4); }
  .scene-card .info h4 { font-size: 13px; color: #d1d5db; margin-bottom: 4px; }
  .scene-card .info .desc { font-size: 11px; color: #6b7280; line-height: 1.5; }
  .scene-card .info .ta { font-size: 10px; color: #8b5cf6; margin-top: 5px; }
  .hum-svg { overflow: visible; }
</style>
</head>
<body>

<h1>HUM</h1>
<p class="subtitle">会哼唱的水母 — VibeCoding Desktop Companion</p>

<div class="section">
  <div class="section-title">Interactive Preview</div>
  <div class="ctrl-label">Scene</div>
  <div class="controls" id="scene-btns">
    <button class="active" data-s="idle">Idle / 待机</button>
    <button data-s="processing">Processing / 编织</button>
    <button data-s="speaking">Speaking / 播报</button>
    <button data-s="inspect">Inspect / 查看Agent</button>
    <button data-s="listening">Listening / 倾听</button>
    <button data-s="waiting">Waiting / 确认</button>
    <button data-s="completed">Completed / 完成</button>
    <button data-s="error">Error / 困惑</button>
  </div>

  <div class="stage">
    <div class="stage-glow" id="stage-glow"></div>
    <div id="main-stage"></div>
  </div>
  <div class="scene-desc" id="scene-desc"></div>

  <div class="section-title">All Scenes</div>
  <div class="scenes-grid" id="scenes-grid"></div>
</div>

<script>
const SCENES = {
  idle: {
    title: 'Idle — 安静漂浮',
    desc: '用户在写代码，Hum 有自己的小世界。缓慢浮动、呼吸、偶尔眨眼，触手像海草一样飘荡。',
    tn: '触手：5根均匀分布，各自悠闲地飘荡摇曳',
    glow: '#6366f1'
  },
  processing: {
    title: 'Processing — 编织代码',
    desc: 'AI Agent 正在执行任务。触手从飘散收拢到身前交叉编织——代码正在被生成的隐喻。体内光点流动。',
    tn: '触手：向中间收拢交叉，末端光点在触手间穿梭流动',
    glow: '#3b82f6'
  },
  speaking: {
    title: 'Speaking — 语音播报',
    desc: '产品核心场景。Hum 向用户播报摘要，伞盖随语音节奏脉冲，触手张开如喇叭扩音，底部显示音频波形。',
    tn: '触手：均匀向外张开呈喇叭形，随节奏微微摆动，扩散声波',
    glow: '#8b5cf6'
  },
  inspect: {
    title: 'Inspect — 查看 Agent',
    desc: '查看当前连接的 AI Agent。Hum 用一根触手"拎"出一个发光的 Agent 标识球展示给用户。',
    tn: '触手：一根伸长卷住发光圆球（橙=Claude, 绿=Codex），其余安静',
    glow: '#f97316'
  },
  listening: {
    title: 'Listening — 倾听用户',
    desc: '用户语音下指令。Hum 歪头侧耳，一根触手变成"麦克风"末端发出绿色光点。',
    tn: '触手：一根末端膨大发光（麦克风），身体微倾歪头倾听',
    glow: '#10b981'
  },
  waiting: {
    title: 'Waiting — 需要确认',
    desc: 'AI 请求权限需要用户批准。Hum 停止漂浮，触手紧张卷起，一根举着"请求卡片"。',
    tn: '触手：多数紧缩，一根举起卡片展示权限请求',
    glow: '#f59e0b'
  },
  completed: {
    title: 'Completed — 任务完成',
    desc: '任务成功！Hum 伞盖绽放，触手向四周散开释放光点烟花，眯眼开心笑。',
    tn: '触手：全部向外绽放伸展，末端释放光点烟花向上飘散',
    glow: '#10b981'
  },
  error: {
    title: 'Error — 哎呀搞不定',
    desc: '执行出错了。Hum 歪头挠头一脸困惑，触手打结纠缠在一起，头顶冒出"?"。不是受伤，是"这啥情况？"的可爱困惑。',
    tn: '触手：两根纠缠打结，一根摸头，表情困惑歪嘴',
    glow: '#f472b6'
  }
};

// ===================== SVG BUILDER =====================
function hum(scene, sz = 160) {
  const cx = sz / 2;
  // Bell (dome) — very round, almost semicircular for cuteness
  const bw = sz * 0.30;  // bell half-width
  const bh = sz * 0.28;  // bell height
  const bt = sz * 0.12;  // bell top y
  const bcy = bt + bh * 0.45;  // bell center y for eyes
  const bby = bt + bh;   // bell bottom y
  const uid = 'u' + Math.random().toString(36).slice(2,7);

  const P = {
    idle:       { b1:'#818cf8', b2:'#6366f1', inner:'#a5b4fc', t:'#8b5cf6', g:'#6366f1', e:'#eef2ff' },
    processing: { b1:'#60a5fa', b2:'#3b82f6', inner:'#93c5fd', t:'#2563eb', g:'#3b82f6', e:'#dbeafe' },
    speaking:   { b1:'#a78bfa', b2:'#7c3aed', inner:'#c4b5fd', t:'#6d28d9', g:'#8b5cf6', e:'#ede9fe' },
    inspect:    { b1:'#818cf8', b2:'#6366f1', inner:'#a5b4fc', t:'#8b5cf6', g:'#6366f1', e:'#eef2ff' },
    listening:  { b1:'#34d399', b2:'#059669', inner:'#6ee7b7', t:'#047857', g:'#10b981', e:'#d1fae5' },
    waiting:    { b1:'#fbbf24', b2:'#d97706', inner:'#fde68a', t:'#b45309', g:'#f59e0b', e:'#fef9c3' },
    completed:  { b1:'#34d399', b2:'#059669', inner:'#6ee7b7', t:'#047857', g:'#10b981', e:'#d1fae5' },
    error:      { b1:'#f9a8d4', b2:'#ec4899', inner:'#fbcfe8', t:'#db2777', g:'#f472b6', e:'#fce7f3' },
  }[scene];

  // Very round dome path — like a big bubble cap
  const bellPath = `
    M ${cx - bw} ${bby}
    C ${cx - bw} ${bt + bh*0.15}, ${cx - bw*0.85} ${bt - bh*0.08}, ${cx} ${bt - bh*0.08}
    C ${cx + bw*0.85} ${bt - bh*0.08}, ${cx + bw} ${bt + bh*0.15}, ${cx + bw} ${bby}
    Q ${cx + bw*0.5} ${bby + 5}, ${cx} ${bby + 4}
    Q ${cx - bw*0.5} ${bby + 5}, ${cx - bw} ${bby}
    Z`;

  // Float anim
  const floatDur = scene === 'processing' ? '2.5' : scene === 'speaking' ? '3' : '4';
  const doFloat = !['waiting','error'].includes(scene);
  const doBreath = ['idle','listening','inspect'].includes(scene);
  const doPump = scene === 'speaking';

  let svg = `<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}" class="hum-svg" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="${uid}bg" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="${P.b1}" stop-opacity="0.55"/>
      <stop offset="80%" stop-color="${P.b2}" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="${P.b2}" stop-opacity="0.08"/>
    </radialGradient>
    <radialGradient id="${uid}ig" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="${P.inner}" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="${P.inner}" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="${uid}tg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${P.t}" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="${P.t}" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="${uid}gl"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  <g>`;

  // Float
  if (doFloat) svg += `<animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="${floatDur}s" repeatCount="indefinite"/>`;
  if (scene === 'listening') svg += `<animateTransform attributeName="transform" type="rotate" values="0 ${cx} ${bcy};-6 ${cx} ${bcy};-6 ${cx} ${bcy}" dur="0.6s" fill="freeze" additive="sum"/>`;
  if (scene === 'error') svg += `<animateTransform attributeName="transform" type="rotate" values="0 ${cx} ${bcy};5 ${cx} ${bcy};5 ${cx} ${bcy}" dur="0.5s" fill="freeze" additive="sum"/>`;

  // Aura
  svg += `<ellipse cx="${cx}" cy="${bcy + 12}" rx="${bw + 12}" ry="${bh + 6}" fill="${P.g}" opacity="0.1" filter="url(#${uid}gl)">`;
  if (scene === 'waiting') svg += `<animate attributeName="opacity" values="0.06;0.18;0.06;0.14;0.06" dur="1.2s" repeatCount="indefinite"/>`;
  if (scene === 'speaking') svg += `<animate attributeName="opacity" values="0.08;0.18;0.08" dur="1s" repeatCount="indefinite"/>`;
  if (scene === 'completed') svg += `<animate attributeName="rx" values="${bw+12};${bw+30};${bw+15}" dur="1.5s" fill="freeze"/>`;
  svg += `</ellipse>`;

  // Tentacles (behind bell)
  svg += tentacles(scene, cx, bby + 2, bw, sz, P, uid);

  // Bell dome
  svg += `<g>`;
  if (doBreath) svg += `<animateTransform attributeName="transform" type="scale" values="1 1;1.02 0.98;1 1" dur="3.5s" repeatCount="indefinite" additive="sum"/>`;
  if (doPump) svg += `<animateTransform attributeName="transform" type="scale" values="1 1;1.04 0.96;1 1" dur="0.8s" repeatCount="indefinite" additive="sum"/>`;

  svg += `<path d="${bellPath}" fill="url(#${uid}bg)" stroke="${P.b1}" stroke-width="0.6" stroke-opacity="0.25"/>`;
  // Inner glow
  svg += `<ellipse cx="${cx}" cy="${bcy}" rx="${bw*0.5}" ry="${bh*0.35}" fill="url(#${uid}ig)">`;
  if (scene === 'processing') svg += `<animate attributeName="opacity" values="0.3;0.6;0.3" dur="2s" repeatCount="indefinite"/>`;
  svg += `</ellipse>`;
  // Subtle inner lines
  svg += `<path d="M ${cx-bw*0.3} ${bcy+6} Q ${cx} ${bcy+1} ${cx+bw*0.3} ${bcy+6}" fill="none" stroke="${P.inner}" stroke-width="0.4" opacity="0.12"/>`;

  // Oral frills
  const frilln = 7;
  const frillW = bw * 1.4;
  for (let i = 0; i < frilln; i++) {
    const fx = cx - frillW/2 + (frillW/(frilln-1)) * i;
    const fh = 3.5 + Math.sin(i*0.9)*1.5;
    svg += `<path d="M ${fx} ${bby+2} Q ${fx+1.5} ${bby+2+fh} ${fx+3} ${bby+2}" fill="none" stroke="${P.t}" stroke-width="1" stroke-linecap="round" opacity="0.3"`;
    if (scene === 'speaking') {
      svg += `><animate attributeName="d" values="M ${fx} ${bby+2} Q ${fx+1.5} ${bby+2+fh} ${fx+3} ${bby+2};M ${fx} ${bby+2} Q ${fx+1.5} ${bby+2+fh+2.5} ${fx+3} ${bby+2};M ${fx} ${bby+2} Q ${fx+1.5} ${bby+2+fh} ${fx+3} ${bby+2}" dur="0.45s" repeatCount="indefinite"/></path>`;
    } else svg += `/>`;
  }
  svg += `</g>`;

  // Eyes
  svg += eyes(scene, cx, bcy - 3, bw, P, uid);
  // Cheeks (blush marks for cuteness!)
  if (['idle','completed','listening','speaking'].includes(scene)) {
    svg += `<ellipse cx="${cx - bw*0.48}" cy="${bcy + 2}" rx="3.5" ry="2" fill="${P.inner}" opacity="0.15"/>`;
    svg += `<ellipse cx="${cx + bw*0.48}" cy="${bcy + 2}" rx="3.5" ry="2" fill="${P.inner}" opacity="0.15"/>`;
  }
  // Mouth
  svg += mouth(scene, cx, bcy + bh*0.22, P, uid);
  // Extras
  svg += extras(scene, cx, bt, bh, bw, bby, sz, P, uid);
  // Client dot
  svg += `<circle cx="${cx + bw*0.72}" cy="${bt + 2}" r="2" fill="${P.g}" opacity="0.6"><animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/></circle>`;

  svg += `</g></svg>`;
  return svg;
}

// ===================== TENTACLES =====================
function tentacles(sc, cx, by, bw, sz, P, uid) {
  const tg = `url(#${uid}tg)`;
  switch(sc) {
    case 'idle': {
      const xs = [-0.65,-0.33,0,0.33,0.65].map(r=>cx+bw*r);
      const lens = [38,46,50,46,38];
      return xs.map((x,i) => {
        const sw = (i%2===0)?6:-6;
        const d = 4.2+i*0.35;
        const l = lens[i];
        return `<path fill="none" stroke="${tg}" stroke-width="2.2" stroke-linecap="round">
          <animate attributeName="d"
            values="M ${x} ${by} C ${x+sw*0.3} ${by+l*0.3} ${x+sw} ${by+l*0.6} ${x-sw*0.4} ${by+l};
                    M ${x} ${by} C ${x-sw*0.3} ${by+l*0.3} ${x-sw} ${by+l*0.6} ${x+sw*0.4} ${by+l};
                    M ${x} ${by} C ${x+sw*0.3} ${by+l*0.3} ${x+sw} ${by+l*0.6} ${x-sw*0.4} ${by+l}"
            dur="${d}s" repeatCount="indefinite"/>
        </path>`;
      }).join('');
    }
    case 'processing': {
      const xs = [-0.55,-0.28,0,0.28,0.55].map(r=>cx+bw*r);
      return xs.map((x,i) => {
        const tx = cx + (i<2?6:i>2?-6:0);
        const l = 34+Math.abs(2-i)*3;
        return `<path fill="none" stroke="${tg}" stroke-width="2.2" stroke-linecap="round">
          <animate attributeName="d"
            values="M ${x} ${by} C ${x} ${by+l*0.35} ${tx+4} ${by+l*0.65} ${tx+3} ${by+l};
                    M ${x} ${by} C ${(x+tx)/2} ${by+l*0.3} ${tx-4} ${by+l*0.6} ${tx-3} ${by+l-2};
                    M ${x} ${by} C ${x} ${by+l*0.35} ${tx+4} ${by+l*0.65} ${tx+3} ${by+l}"
            dur="2s" repeatCount="indefinite"/>
        </path>`;
      }).join('') +
      [0,1,2].map(i=>`<circle r="2" fill="${P.inner}" opacity="0">
        <animate attributeName="cx" values="${cx-8+i*8};${cx+2-i*2};${cx-8+i*8}" dur="1.8s" repeatCount="indefinite" begin="${i*0.5}s"/>
        <animate attributeName="cy" values="${by+32};${by+10};${by+32}" dur="1.8s" repeatCount="indefinite" begin="${i*0.5}s"/>
        <animate attributeName="opacity" values="0;0.8;0" dur="1.8s" repeatCount="indefinite" begin="${i*0.5}s"/>
      </circle>`).join('');
    }
    case 'speaking': {
      const xs = [-0.7,-0.35,0,0.35,0.7].map(r=>cx+bw*r);
      const exs = [-1.05,-0.52,0,0.52,1.05].map(r=>cx+bw*r);
      const lens = [32,38,42,38,32];
      return xs.map((x,i) => {
        const ex = exs[i]; const l = lens[i];
        return `<path fill="none" stroke="${tg}" stroke-width="2.2" stroke-linecap="round">
          <animate attributeName="d"
            values="M ${x} ${by} C ${(x+ex)/2} ${by+l*0.4} ${ex} ${by+l*0.7} ${ex} ${by+l};
                    M ${x} ${by} C ${(x+ex)/2+2} ${by+l*0.35} ${ex+2} ${by+l*0.65} ${ex+3} ${by+l-2};
                    M ${x} ${by} C ${(x+ex)/2} ${by+l*0.4} ${ex} ${by+l*0.7} ${ex} ${by+l}"
            dur="1.6s" repeatCount="indefinite"/>
        </path>`;
      }).join('');
    }
    case 'inspect': {
      // 4 idle + 1 holding agent orb
      const idle = [-0.65,-0.33,0,0.33].map(r=>cx+bw*r).map((x,i) => {
        const sw = (i%2===0)?4:-4;
        return `<path fill="none" stroke="${tg}" stroke-width="2" stroke-linecap="round" opacity="0.45">
          <animate attributeName="d"
            values="M ${x} ${by} C ${x+sw*0.3} ${by+12} ${x+sw} ${by+24} ${x-sw*0.3} ${by+32};
                    M ${x} ${by} C ${x-sw*0.3} ${by+12} ${x-sw} ${by+24} ${x+sw*0.3} ${by+32};
                    M ${x} ${by} C ${x+sw*0.3} ${by+12} ${x+sw} ${by+24} ${x-sw*0.3} ${by+32}"
            dur="${4.5+i*0.3}s" repeatCount="indefinite"/>
        </path>`;
      }).join('');
      // Active tentacle curling around orb
      const tx = cx + bw*0.65;
      const ox = tx + 18, oy = by + 18;
      return idle + `
        <path fill="none" stroke="${P.t}" stroke-width="2.5" stroke-linecap="round" opacity="0.6">
          <animate attributeName="d"
            values="M ${tx} ${by} C ${tx+8} ${by+5} ${ox-6} ${oy-10} ${ox-2} ${oy-6} S ${ox+5} ${oy+2} ${ox} ${oy+6};
                    M ${tx} ${by} C ${tx+10} ${by+4} ${ox-5} ${oy-11} ${ox-1} ${oy-7} S ${ox+6} ${oy+1} ${ox+1} ${oy+5};
                    M ${tx} ${by} C ${tx+8} ${by+5} ${ox-6} ${oy-10} ${ox-2} ${oy-6} S ${ox+5} ${oy+2} ${ox} ${oy+6}"
            dur="3s" repeatCount="indefinite"/>
        </path>
        <circle cx="${ox}" cy="${oy}" r="7.5" fill="#f97316" opacity="0.65">
          <animate attributeName="opacity" values="0.45;0.8;0.45" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="${ox}" cy="${oy}" r="10.5" fill="none" stroke="#f97316" stroke-width="0.7" opacity="0.25">
          <animate attributeName="r" values="10.5;13;10.5" dur="2s" repeatCount="indefinite"/>
        </circle>
        <text x="${ox}" y="${oy+3}" text-anchor="middle" font-size="7" fill="white" font-weight="700" opacity="0.85">C</text>`;
    }
    case 'listening': {
      const idle = [-0.6,-0.28,0,0.3].map(r=>cx+bw*r).map((x,i) => {
        return `<path d="M ${x} ${by} C ${x+2} ${by+12} ${x-1} ${by+24} ${x+1} ${by+32}"
          fill="none" stroke="${tg}" stroke-width="2" stroke-linecap="round" opacity="0.4">
          <animate attributeName="d"
            values="M ${x} ${by} C ${x+2} ${by+12} ${x-1} ${by+24} ${x+1} ${by+32};
                    M ${x} ${by} C ${x-1} ${by+12} ${x+2} ${by+24} ${x-1} ${by+32};
                    M ${x} ${by} C ${x+2} ${by+12} ${x-1} ${by+24} ${x+1} ${by+32}"
            dur="5s" repeatCount="indefinite"/>
        </path>`;
      }).join('');
      const mx = cx+bw*0.7, my = by+36;
      return idle + `
        <path fill="none" stroke="${P.t}" stroke-width="2.5" stroke-linecap="round" opacity="0.6">
          <animate attributeName="d"
            values="M ${mx} ${by} C ${mx+5} ${by+10} ${mx+8} ${by+22} ${mx+8} ${my-4};
                    M ${mx} ${by} C ${mx+6} ${by+8} ${mx+10} ${by+20} ${mx+10} ${my-6};
                    M ${mx} ${by} C ${mx+5} ${by+10} ${mx+8} ${by+22} ${mx+8} ${my-4}"
            dur="2.5s" repeatCount="indefinite"/>
        </path>
        <circle cx="${mx+8}" cy="${my-3}" r="3.5" fill="${P.g}" opacity="0.55">
          <animate attributeName="opacity" values="0.35;0.85;0.35" dur="1s" repeatCount="indefinite"/>
          <animate attributeName="r" values="3;4;3" dur="1s" repeatCount="indefinite"/>
        </circle>`;
    }
    case 'waiting': {
      // Tense curled + one holding card
      const xs = [-0.45,-0.15,0.15,0.45].map(r=>cx+bw*r);
      const curled = xs.map((x,i) => {
        const dir = (i<2)?1:-1;
        return `<path fill="none" stroke="${tg}" stroke-width="2.2" stroke-linecap="round">
          <animate attributeName="d"
            values="M ${x} ${by} C ${x+dir*6} ${by+6} ${x+dir*10} ${by+10} ${x+dir*6} ${by+14};
                    M ${x} ${by} C ${x+dir*7} ${by+5} ${x+dir*11} ${by+9} ${x+dir*7} ${by+13};
                    M ${x} ${by} C ${x+dir*6} ${by+6} ${x+dir*10} ${by+10} ${x+dir*6} ${by+14}"
            dur="1.5s" repeatCount="indefinite"/>
        </path>`;
      }).join('');
      const cy2 = by + 34;
      return curled + `
        <path fill="none" stroke="${P.t}" stroke-width="2.2" stroke-linecap="round" opacity="0.55">
          <animate attributeName="d"
            values="M ${cx} ${by} C ${cx} ${by+12} ${cx} ${by+20} ${cx} ${cy2-8};
                    M ${cx} ${by} C ${cx+1} ${by+11} ${cx+1} ${by+19} ${cx+1} ${cy2-9};
                    M ${cx} ${by} C ${cx} ${by+12} ${cx} ${by+20} ${cx} ${cy2-8}"
            dur="1.8s" repeatCount="indefinite"/>
        </path>
        <rect x="${cx-11}" y="${cy2-5}" width="22" height="14" rx="2.5" fill="${P.b2}" opacity="0.35" stroke="${P.g}" stroke-width="0.7" opacity="0.4">
          <animate attributeName="opacity" values="0.25;0.45;0.25" dur="1.2s" repeatCount="indefinite"/>
        </rect>
        <line x1="${cx-6}" y1="${cy2+1}" x2="${cx+6}" y2="${cy2+1}" stroke="${P.inner}" stroke-width="0.7" opacity="0.4"/>
        <line x1="${cx-6}" y1="${cy2+4.5}" x2="${cx+3}" y2="${cy2+4.5}" stroke="${P.inner}" stroke-width="0.5" opacity="0.25"/>`;
    }
    case 'completed': {
      const angs = [-55,-28,0,28,55];
      const xs0 = [-0.6,-0.3,0,0.3,0.6].map(r=>cx+bw*r);
      return angs.map((deg,i) => {
        const rad = deg*Math.PI/180;
        const l = 44;
        const ex = cx+Math.sin(rad)*l;
        const ey = by+Math.cos(rad)*l;
        const x = xs0[i];
        return `<path fill="none" stroke="${tg}" stroke-width="2.2" stroke-linecap="round">
          <animate attributeName="d"
            values="M ${x} ${by} C ${x} ${by+10} ${x} ${by+18} ${x} ${by+22};
                    M ${x} ${by} C ${(x+ex)/2} ${by+l*0.3} ${ex+(i%2?2:-2)} ${ey-8} ${ex} ${ey};
                    M ${x} ${by} C ${(x+ex)/2} ${by+l*0.3} ${ex+(i%2?2:-2)} ${ey-8} ${ex} ${ey}"
            dur="1.2s" fill="freeze"/>
        </path>
        <circle cx="${ex}" cy="${ey}" r="1.8" fill="${P.inner}" opacity="0">
          <animate attributeName="opacity" values="0;0.9;0" dur="1.8s" begin="0.7s"/>
          <animate attributeName="cy" values="${ey};${ey-14}" dur="1.8s" begin="0.7s"/>
          <animate attributeName="r" values="1.8;0.3" dur="1.8s" begin="0.7s"/>
        </circle>`;
      }).join('');
    }
    case 'error': {
      // Confused: two tentacles tangled/knotted, one scratching head, two droopy
      const droopy = [-0.55, 0.55].map(r=>cx+bw*r).map((x,i) => {
        return `<path d="M ${x} ${by} C ${x} ${by+8} ${x+(i?-3:3)} ${by+16} ${x+(i?-5:5)} ${by+22}"
          fill="none" stroke="${tg}" stroke-width="2" stroke-linecap="round" opacity="0.35"/>`;
      }).join('');
      // Two tangled tentacles in the middle
      const t1x = cx-bw*0.2, t2x = cx+bw*0.2;
      const tangled = `
        <path fill="none" stroke="${P.t}" stroke-width="2.2" stroke-linecap="round" opacity="0.45">
          <animate attributeName="d"
            values="M ${t1x} ${by} C ${t1x} ${by+10} ${t1x} ${by+18} ${t1x} ${by+26};
                    M ${t1x} ${by} C ${t1x+8} ${by+8} ${t2x+4} ${by+14} ${t1x-2} ${by+22} S ${t1x+6} ${by+28} ${t1x+3} ${by+30};
                    M ${t1x} ${by} C ${t1x+8} ${by+8} ${t2x+4} ${by+14} ${t1x-2} ${by+22} S ${t1x+6} ${by+28} ${t1x+3} ${by+30}"
            dur="0.8s" fill="freeze"/>
        </path>
        <path fill="none" stroke="${P.t}" stroke-width="2.2" stroke-linecap="round" opacity="0.45">
          <animate attributeName="d"
            values="M ${t2x} ${by} C ${t2x} ${by+10} ${t2x} ${by+18} ${t2x} ${by+26};
                    M ${t2x} ${by} C ${t2x-8} ${by+8} ${t1x-4} ${by+14} ${t2x+2} ${by+22} S ${t2x-4} ${by+26} ${t2x-2} ${by+28};
                    M ${t2x} ${by} C ${t2x-8} ${by+8} ${t1x-4} ${by+14} ${t2x+2} ${by+22} S ${t2x-4} ${by+26} ${t2x-2} ${by+28}"
            dur="0.8s" fill="freeze"/>
        </path>`;
      // One tentacle scratching head
      const sx = cx + bw*0.5;
      const scratch = `
        <path fill="none" stroke="${P.t}" stroke-width="2" stroke-linecap="round" opacity="0.5">
          <animate attributeName="d"
            values="M ${sx} ${by} C ${sx+4} ${by-4} ${sx+10} ${by-14} ${sx+6} ${by-20};
                    M ${sx} ${by} C ${sx+5} ${by-5} ${sx+11} ${by-13} ${sx+7} ${by-22};
                    M ${sx} ${by} C ${sx+4} ${by-4} ${sx+10} ${by-14} ${sx+6} ${by-20}"
            dur="1.2s" repeatCount="indefinite"/>
        </path>`;
      return droopy + tangled + scratch;
    }
    default: return '';
  }
}

// ===================== EYES =====================
function eyes(sc, cx, ey, bw, P, uid) {
  const sp = bw * 0.32;
  const lx = cx-sp, rx = cx+sp;
  const r = 3;

  if (sc === 'completed') {
    return `
      <path d="M ${lx-4} ${ey+1} Q ${lx} ${ey-4} ${lx+4} ${ey+1}" fill="none" stroke="${P.e}" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
      <path d="M ${rx-4} ${ey+1} Q ${rx} ${ey-4} ${rx+4} ${ey+1}" fill="none" stroke="${P.e}" stroke-width="2" stroke-linecap="round" opacity="0.9"/>`;
  }
  if (sc === 'error') {
    // Spiral/confused eyes (one @ one x)
    return `
      <g opacity="0.8">
        <circle cx="${lx}" cy="${ey}" r="3.5" fill="none" stroke="${P.e}" stroke-width="1.2"/>
        <path d="M ${lx-1} ${ey-1} A 1.5 1.5 0 1 1 ${lx+1.5} ${ey+0.5}" fill="none" stroke="${P.e}" stroke-width="1"/>
      </g>
      <g opacity="0.8">
        <line x1="${rx-2.5}" y1="${ey-2.5}" x2="${rx+2.5}" y2="${ey+2.5}" stroke="${P.e}" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="${rx+2.5}" y1="${ey-2.5}" x2="${rx-2.5}" y2="${ey+2.5}" stroke="${P.e}" stroke-width="1.5" stroke-linecap="round"/>
      </g>`;
  }
  if (sc === 'waiting') {
    return `
      <circle cx="${lx}" cy="${ey}" r="4" fill="${P.e}" opacity="0.85"/>
      <circle cx="${rx}" cy="${ey}" r="4" fill="${P.e}" opacity="0.85"/>
      <circle cx="${lx}" cy="${ey+0.5}" r="2" fill="rgba(0,0,0,0.3)"/>
      <circle cx="${rx}" cy="${ey+0.5}" r="2" fill="rgba(0,0,0,0.3)"/>`;
  }
  if (sc === 'processing') {
    return `
      <circle cx="${lx}" cy="${ey}" r="2.5" fill="${P.e}" opacity="0.75">
        <animate attributeName="cy" values="${ey};${ey-1.5};${ey}" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="${rx}" cy="${ey}" r="2.5" fill="${P.e}" opacity="0.75">
        <animate attributeName="cy" values="${ey};${ey-1.5};${ey}" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="${lx}" cy="${ey}" r="1.2" fill="rgba(0,0,0,0.25)"><animate attributeName="cy" values="${ey};${ey-1.5};${ey}" dur="2.5s" repeatCount="indefinite"/></circle>
      <circle cx="${rx}" cy="${ey}" r="1.2" fill="rgba(0,0,0,0.25)"><animate attributeName="cy" values="${ey};${ey-1.5};${ey}" dur="2.5s" repeatCount="indefinite"/></circle>`;
  }
  // Default — round eyes with blink
  return `
    <circle cx="${lx}" cy="${ey}" r="${r}" fill="${P.e}" opacity="0.82">
      <animate attributeName="ry" values="${r};${r};0.4;${r};${r}" dur="5s" repeatCount="indefinite" keyTimes="0;0.46;0.5;0.54;1"/>
    </circle>
    <circle cx="${rx}" cy="${ey}" r="${r}" fill="${P.e}" opacity="0.82">
      <animate attributeName="ry" values="${r};${r};0.4;${r};${r}" dur="5s" repeatCount="indefinite" keyTimes="0;0.46;0.5;0.54;1"/>
    </circle>
    <circle cx="${lx}" cy="${ey+0.3}" r="1.3" fill="rgba(0,0,0,0.28)"/>
    <circle cx="${rx}" cy="${ey+0.3}" r="1.3" fill="rgba(0,0,0,0.28)"/>`;
}

// ===================== MOUTH =====================
function mouth(sc, cx, my, P, uid) {
  if (sc === 'speaking')
    return `<ellipse cx="${cx}" cy="${my}" rx="3" fill="${P.e}" opacity="0.45"><animate attributeName="ry" values="1;3.5;1.5;2.8;1" dur="0.8s" repeatCount="indefinite"/></ellipse>`;
  if (sc === 'completed')
    return `<path d="M ${cx-5} ${my} Q ${cx} ${my+5} ${cx+5} ${my}" fill="none" stroke="${P.e}" stroke-width="1.5" stroke-linecap="round" opacity="0.65"/>`;
  if (sc === 'error')
    return `<path d="M ${cx-3} ${my+1} Q ${cx} ${my-1} ${cx+3} ${my+2}" fill="none" stroke="${P.e}" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>`;
  if (sc === 'waiting')
    return `<ellipse cx="${cx}" cy="${my}" rx="2.5" ry="3" fill="${P.e}" opacity="0.3"/>`;
  if (sc === 'processing')
    return `<line x1="${cx-3}" y1="${my}" x2="${cx+3}" y2="${my}" stroke="${P.e}" stroke-width="1.2" stroke-linecap="round" opacity="0.3"/>`;
  // Default smile
  return `<path d="M ${cx-4} ${my} Q ${cx} ${my+3.5} ${cx+4} ${my}" fill="none" stroke="${P.e}" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>`;
}

// ===================== EXTRAS =====================
function extras(sc, cx, bt, bh, bw, bby, sz, P, uid) {
  if (sc === 'speaking') {
    // Voice bars + sound wave rings
    const bn = 7, bwi = 2, bg = 2.8, tw = bn*bwi+(bn-1)*bg, sx = cx-tw/2, barY = bby+54;
    let bars = '';
    for(let i=0;i<bn;i++){
      const x=sx+i*(bwi+bg), dl=(i*0.08).toFixed(2);
      bars+=`<rect x="${x}" y="${barY}" width="${bwi}" rx="1" fill="${P.t}" opacity="0.45">
        <animate attributeName="height" values="2;9;3;7;2" dur="0.55s" begin="${dl}s" repeatCount="indefinite"/>
        <animate attributeName="y" values="${barY};${barY-7};${barY-1};${barY-5};${barY}" dur="0.55s" begin="${dl}s" repeatCount="indefinite"/>
      </rect>`;
    }
    let waves = [0,0.5,1].map(d=>`
      <ellipse cx="${cx}" cy="${bt+bh*0.4}" fill="none" stroke="${P.g}" stroke-width="0.5" opacity="0">
        <animate attributeName="rx" values="${bw*0.9};${bw*1.7}" dur="1.5s" begin="${d}s" repeatCount="indefinite"/>
        <animate attributeName="ry" values="${bh*0.5};${bh*1.1}" dur="1.5s" begin="${d}s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.3;0" dur="1.5s" begin="${d}s" repeatCount="indefinite"/>
      </ellipse>`).join('');
    return bars + waves;
  }
  if (sc === 'waiting') {
    return `<text x="${cx}" y="${bt-8}" text-anchor="middle" font-size="14" font-weight="800" fill="${P.g}" opacity="0.75">!
      <animate attributeName="y" values="${bt-8};${bt-12};${bt-8}" dur="0.8s" repeatCount="indefinite"/>
    </text>`;
  }
  if (sc === 'completed') {
    return [{x:cx-22,y:bt-4,dx:-8,dy:-16},{x:cx+22,y:bt,dx:10,dy:-14},{x:cx-28,y:bt+bh,dx:-11,dy:-4},{x:cx+28,y:bt+bh-4,dx:12,dy:-7},{x:cx,y:bt-8,dx:0,dy:-18}]
      .map((s,i)=>`<circle cx="${s.x}" cy="${s.y}" r="2" fill="${P.inner}" opacity="0">
        <animate attributeName="cx" values="${s.x};${s.x+s.dx}" dur="1.8s" begin="${i*0.12}s"/>
        <animate attributeName="cy" values="${s.y};${s.y+s.dy}" dur="1.8s" begin="${i*0.12}s"/>
        <animate attributeName="opacity" values="0;0.85;0" dur="1.8s" begin="${i*0.12}s"/>
        <animate attributeName="r" values="2;0.5" dur="1.8s" begin="${i*0.12}s"/>
      </circle>`).join('');
  }
  if (sc === 'listening') {
    const bn=5,bwi=1.5,bg=2.2,tw=bn*bwi+(bn-1)*bg,sx=cx-tw/2,barY=bby+48;
    return Array.from({length:bn},(_,i)=>{
      const x=sx+i*(bwi+bg),dl=(i*0.12).toFixed(2);
      return `<rect x="${x}" y="${barY}" width="${bwi}" rx="0.75" fill="${P.g}" opacity="0.25">
        <animate attributeName="height" values="1;4;1" dur="1s" begin="${dl}s" repeatCount="indefinite"/>
        <animate attributeName="y" values="${barY};${barY-3};${barY}" dur="1s" begin="${dl}s" repeatCount="indefinite"/>
      </rect>`;
    }).join('');
  }
  if (sc === 'error') {
    return `<text x="${cx+2}" y="${bt-6}" text-anchor="middle" font-size="12" fill="${P.g}" opacity="0.7" font-weight="600">?
      <animate attributeName="y" values="${bt-6};${bt-9};${bt-6}" dur="1.5s" repeatCount="indefinite"/>
    </text>`;
  }
  return '';
}

// ===================== SCENE CONTROL =====================
let curScene = 'idle';

function setScene(s) {
  curScene = s;
  document.getElementById('main-stage').innerHTML = hum(s, 180);
  const info = SCENES[s];
  document.getElementById('scene-desc').innerHTML = `<h3>${info.title}</h3><p>${info.desc}</p><div class="tn">${info.tn}</div>`;
  document.getElementById('stage-glow').style.background = info.glow;
  document.querySelectorAll('#scene-btns button').forEach(b => b.classList.toggle('active', b.dataset.s === s));
  document.querySelectorAll('.scene-card').forEach(c => c.classList.toggle('active', c.dataset.s === s));
}

// Build scene cards
const grid = document.getElementById('scenes-grid');
Object.entries(SCENES).forEach(([k, info]) => {
  const c = document.createElement('div');
  c.className = 'scene-card' + (k==='idle'?' active':'');
  c.dataset.s = k;
  c.onclick = () => setScene(k);
  c.innerHTML = `<div class="preview" style="flex-shrink:0">${hum(k, 90)}</div>
    <div class="info"><h4>${info.title}</h4><div class="desc">${info.desc.slice(0,80)}...</div><div class="ta">${info.tn}</div></div>`;
  grid.appendChild(c);
});

// Init + replay one-shots
setScene('idle');
setInterval(() => {
  if (['completed','error'].includes(curScene)) document.getElementById('main-stage').innerHTML = hum(curScene, 180);
  document.querySelectorAll('.scene-card').forEach(c => {
    const s = c.dataset.s;
    if (['completed','error'].includes(s)) c.querySelector('.preview').innerHTML = hum(s, 90);
  });
}, 4000);
</script>
