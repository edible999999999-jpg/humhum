<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f8fbff">
  <title>HUMHUM Mobile</title>
  <style>
    *{box-sizing:border-box}body{margin:0;background:#f8fbff;color:#243247;font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;letter-spacing:0}main{width:min(100%,720px);margin:auto;padding:calc(24px + env(safe-area-inset-top)) 18px calc(28px + env(safe-area-inset-bottom))}header{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #dfe8f2;padding-bottom:16px}h1{font-size:22px;margin:0}.status{font-size:13px;color:#60728a}.pair{padding:32px 0}.pair h2{font-size:20px;margin:0 0 8px}.pair p{color:#60728a;margin:0 0 18px}label{display:block;font-weight:650;margin:14px 0 6px}input,textarea{width:100%;border:1px solid #cbd9e8;border-radius:8px;background:white;padding:0 14px;font:inherit}input{height:48px;text-transform:uppercase}textarea{min-height:76px;padding-top:10px;resize:vertical}button{height:46px;border:0;border-radius:8px;background:#2563eb;color:white;font:inherit;font-weight:700;padding:0 18px;margin-top:14px;width:100%}button:disabled{opacity:.55}.error{color:#c2413b;margin-top:12px}.sessions{display:grid;gap:10px;padding-top:18px}.session{background:white;border:1px solid #dfe8f2;border-left:4px solid #86a7d5;border-radius:8px;padding:14px}.session.attention{border-left-color:#ef8a4c}.row{display:flex;gap:12px;justify-content:space-between;align-items:start}.project{font-weight:750;overflow-wrap:anywhere}.agent{font-size:12px;color:#60728a;text-transform:uppercase}.meta{font-size:13px;color:#60728a;margin-top:7px}.actions,.compose{display:grid;gap:9px;margin-top:12px;padding-top:12px;border-top:1px solid #e4ebf3}.action{font-size:13px}.action strong{display:block;margin-bottom:3px}.action-buttons{display:grid;grid-template-columns:1fr 1fr;gap:8px}.action-buttons button{height:40px;margin-top:8px}.action-buttons .deny{background:#edf1f6;color:#485c73}.compose button{height:40px;margin-top:0}.empty{text-align:center;color:#60728a;padding:48px 0}@media(max-width:420px){main{padding-left:14px;padding-right:14px}.row{gap:8px}h1{font-size:20px}}
  </style>
</head>
<body>
<main>
  <header><h1>HUMHUM</h1><span class="status" id="status">等待配对</span></header>
  <section class="pair" id="pair">
    <h2>连接这台 Mac</h2>
    <p>在 Mac 上打开 Hexa，生成一次性配对码后输入这里。</p>
    <label for="code">配对码</label><input id="code" autocomplete="one-time-code" maxlength="8" placeholder="8 位配对码">
    <label for="name">设备名称</label><input id="name" maxlength="80" placeholder="我的手机">
    <button id="pairButton">安全配对</button><div class="error" id="error"></div>
  </section>
  <section class="sessions" id="sessions" hidden></section>
</main>
<script>
const pair=document.getElementById('pair'),sessions=document.getElementById('sessions'),statusEl=document.getElementById('status'),errorEl=document.getElementById('error');
let token=localStorage.getItem('humhum_mobile_token')||'',scope='read';const drafts={};
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const actionHtml=a=>`<div class="action"><strong>${esc(a.operation)}</strong><div>${esc(a.summary)}</div><div class="action-buttons"><button class="deny" data-decision="deny" data-id="${esc(a.id)}" data-provider="${esc(a.provider)}">拒绝</button><button data-decision="allow_once" data-id="${esc(a.id)}" data-provider="${esc(a.provider)}">允许一次</button></div></div>`;
const composeHtml=s=>s.can_message?`<div class="compose"><textarea maxlength="20000" data-draft="${esc(s.id)}" placeholder="给这个 Agent 会话发送跟进">${esc(drafts[s.id]||'')}</textarea><button data-send="${esc(s.id)}" data-provider="${esc(s.agent)}">发送跟进</button></div>`:'';
async function refresh(){if(!token)return;try{const r=await fetch('/api/sessions',{headers:{Authorization:'Bearer '+token}});if(r.status===401){token='';localStorage.removeItem('humhum_mobile_token');pair.hidden=false;sessions.hidden=true;statusEl.textContent='需要重新配对';return}const data=await r.json();scope=data.scope||'read';pair.hidden=true;sessions.hidden=false;statusEl.textContent=scope==='control'?'已安全连接 · 可控制':'已安全连接 · 只读';sessions.innerHTML=data.sessions.length?data.sessions.map(s=>`<article class="session ${s.needs_attention?'attention':''}"><div class="row"><div class="project">${esc(s.project)}</div><div class="agent">${esc(s.agent)}</div></div><div class="meta">${s.needs_attention?'需要你处理 · ':''}${esc(s.status)} · ${new Date(s.last_activity_at).toLocaleString()}</div>${s.pending_actions?.length?`<div class="actions">${s.pending_actions.map(actionHtml).join('')}</div>`:''}${composeHtml(s)}</article>`).join(''):'<div class="empty">最近没有 Agent 会话</div>'}catch(e){statusEl.textContent='Mac 暂时不可达'}}
sessions.addEventListener('input',event=>{const field=event.target.closest('textarea[data-draft]');if(field)drafts[field.dataset.draft]=field.value});
sessions.addEventListener('click',async event=>{const button=event.target.closest('button[data-id]');if(!button)return;button.disabled=true;try{const hook=button.dataset.provider!=='codex',r=await fetch(hook?'/api/hook/permission':'/api/codex/approval',{method:'POST',headers:{Authorization:'Bearer '+token,'content-type':'application/json'},body:JSON.stringify(hook?{event_id:button.dataset.id,decision:button.dataset.decision}:{approval_id:button.dataset.id,decision:button.dataset.decision})});const data=await r.json();if(!r.ok)throw new Error(data.error||'操作失败');await refresh()}catch(e){statusEl.textContent=e.message}finally{button.disabled=false}});
sessions.addEventListener('click',async event=>{const button=event.target.closest('button[data-send]');if(!button)return;const sessionId=button.dataset.send,message=(drafts[sessionId]||'').trim();if(!message)return;button.disabled=true;try{const r=await fetch('/api/session/message',{method:'POST',headers:{Authorization:'Bearer '+token,'content-type':'application/json'},body:JSON.stringify({session_id:sessionId,provider:button.dataset.provider,message})});const data=await r.json();if(!r.ok)throw new Error(data.error||'发送失败');delete drafts[sessionId];statusEl.textContent=data.status==='delivered'?'跟进已送达':'跟进已进入队列';await refresh()}catch(e){statusEl.textContent=e.message}finally{button.disabled=false}});
document.getElementById('pairButton').onclick=async()=>{const button=document.getElementById('pairButton');button.disabled=true;errorEl.textContent='';try{const r=await fetch('/api/pair',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({code:document.getElementById('code').value,device_name:document.getElementById('name').value})});const data=await r.json();if(!r.ok)throw new Error(data.error||'配对失败');token=data.token;localStorage.setItem('humhum_mobile_token',token);await refresh()}catch(e){errorEl.textContent=e.message}finally{button.disabled=false}};
refresh();setInterval(refresh,5000);
</script>
</body>
</html>
