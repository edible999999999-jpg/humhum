name: Release macOS

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  notarized-release:
    name: Signed and notarized DMG
    runs-on: macos-14
    environment: macos-release

    steps:
      - name: Check out the release tag
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Prepare the notarization API key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          umask 077
          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$key_path"
          echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Build, sign, and notarize
        env:
          CI: "true"
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: npm run tauri -- build --bundles dmg

      - name: Verify the notarized artifact
        run: |
          dmg_path="$(find src-tauri/target/release/bundle/dmg -name '*.dmg' -print -quit)"
          test -n "$dmg_path"
          xcrun stapler validate "$dmg_path"
          spctl -a -vvv -t open "$dmg_path"
          checksum_path="${dmg_path}.sha256"
          shasum -a 256 "$dmg_path" > "$checksum_path"
          echo "DMG_PATH=$dmg_path" >> "$GITHUB_ENV"
          echo "CHECKSUM_PATH=$checksum_path" >> "$GITHUB_ENV"

      - name: Publish the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$DMG_PATH" "$CHECKSUM_PATH" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$DMG_PATH" "$CHECKSUM_PATH" \
              --title "HUMHUM $GITHUB_REF_NAME" \
              --generate-notes
          fi
