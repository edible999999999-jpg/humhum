name: Windows CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Test and bundle (Windows x64)
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.89.0

      - name: Cache Rust build data
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate Windows PowerShell 5.1 scripts
        shell: powershell
        run: |
          $failed = $false
          $scriptFiles = @(
            Get-ChildItem hooks -Filter *.ps1
            Get-ChildItem scripts -Filter *.ps1
          )
          $scriptFiles | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Error "$_" }
              $failed = $true
            }
          }
          if ($failed) { exit 1 }

      - name: Test Windows hook merge scripts
        shell: powershell
        run: .\scripts\test-windows-hooks.ps1

      - name: Smoke test Windows system TTS helper
        shell: powershell
        run: |
          $outputPath = Join-Path $env:RUNNER_TEMP "humhum-system-tts-smoke.wav"
          try {
            "HumHum system speech test" |
              & .\scripts\system-tts-windows.ps1 -OutputPath $outputPath
            if (-not (Test-Path -LiteralPath $outputPath)) {
              throw "System TTS helper did not create a WAV file"
            }
            if ((Get-Item -LiteralPath $outputPath).Length -le 44) {
              throw "System TTS helper created an empty WAV file"
            }
          } finally {
            Remove-Item -LiteralPath $outputPath -Force -ErrorAction SilentlyContinue
          }

      - name: Fetch Rust dependencies
        run: cargo fetch --manifest-path src-tauri/Cargo.toml --locked

      - name: Run frontend and relay tests
        run: npm run test:all

      - name: Build frontend
        run: npm run build

      - name: Check Rust backend
        run: cargo check --manifest-path src-tauri/Cargo.toml --locked

      - name: Test Rust backend
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked --lib

      - name: Build unsigned NSIS installer
        run: npm run tauri build -- --bundles nsis

      - name: Verify generated Tauri schemas
        shell: pwsh
        run: |
          $schemaChanges = @(
            git status --porcelain --untracked-files=all -- src-tauri/gen/schemas
          )
          if ($schemaChanges.Count -gt 0) {
            $schemaChanges | ForEach-Object { Write-Error $_ }
            throw "Tauri schema generation changed tracked or untracked files"
          }

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: HumHum-Windows-NSIS-${{ github.run_number }}
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14
