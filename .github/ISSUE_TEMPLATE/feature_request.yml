name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      placeholder: What problem does this solve, or what would it improve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: How should it work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Any other approaches you thought about?
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Voice pipeline (TTS / STT / Summarizer)
        - Desktop pet (rendering / animations)
        - Hook system (event handling / client adapters)
        - Settings / UI
        - Stats / analytics
        - Platform support
        - Other
    validations:
      required: true
